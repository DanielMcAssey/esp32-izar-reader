; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; Plain `pio run` / `pio run -t upload` builds & flashes over USB.
; For wireless flashing use:  pio run -e ota -t upload
default_envs = usb

; --- Shared configuration applied to every environment ---------------------
[env]
; Pinned for reproducible builds (bump deliberately, not implicitly).
platform = espressif32@7.0.1
board = esp32doit-devkit-v1
framework = arduino

monitor_speed = 115200
; Decode crash backtraces to file:line and timestamp each serial line.
monitor_filters = esp32_exception_decoder, time

; wMbus-lib uses std::vector / std::string
build_flags =
	-std=gnu++17
build_unflags =
	-std=gnu++11

; Static analysis: run `pio check`
check_tool = cppcheck
check_skip_packages = yes
check_src_filters =
	+<src/>
	+<include/>
check_flags =
	cppcheck: --enable=warning,style,performance,portability --inline-suppr --suppress=missingInclude --suppress=preprocessorErrorDirective

lib_deps =
	; CC1101 + wM-Bus T1 reception / link layer (same stack as the ESPHome project).
	; Pinned to the last release of this (archived) repo for reproducibility.
	https://github.com/SzczepanLeon/wMbus-lib#1.4.7
	; CC1101 SPI driver (transitive dep of wMbus-lib, pinned explicitly)
	lsatan/SmartRC-CC1101-Driver-Lib@^2.5.7
	; MQTT publishing to Home Assistant
	knolleary/PubSubClient@^2.8
	; JSON payloads (HA MQTT discovery / state)
	bblanchon/ArduinoJson@^7

; --- Flash over USB serial (default) ---------------------------------------
[env:usb]
upload_speed = 921600

; --- Flash wirelessly (device must already run OTA-capable firmware) --------
; Set the OTA password to match OTA_PASSWORD in secrets.h, e.g.:
;   export IZAR_OTA_PASSWORD=your-password   (Windows PowerShell: $env:IZAR_OTA_PASSWORD="...")
; Then:  pio run -e ota -t upload
[env:ota]
upload_protocol = espota
upload_port = izar-watermeter.local
upload_flags =
	--auth=${sysenv.IZAR_OTA_PASSWORD}
